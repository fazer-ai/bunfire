<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./favicon-light.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="./favicon-dark.png" media="(prefers-color-scheme: dark)" />
  <title>Bun + React - fazer.ai Template</title>
</head>

<body>
  <script>
    (function() {
      var s = localStorage.getItem('@app:theme');
      var t = 'dark';
      if (s === 'light') t = 'light';
      else if (s !== 'dark' && window.matchMedia('(prefers-color-scheme: light)').matches) t = 'light';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="../src/client/frontend.tsx"></script>
</body>

</html>
