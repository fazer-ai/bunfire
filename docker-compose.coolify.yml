version: '3'

services:
  bunfire:
    image: 'ghcr.io/fazer-ai/bunfire:latest'
    pull_policy: always
    volumes:
      - 'storage:/app/storage'
    environment:
      - SERVICE_URL_BUNFIRE
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - PUBLIC_URL=${SERVICE_URL_BUNFIRE}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${SERVICE_PASSWORD_64_JWTSECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - CDN_URL=${SERVICE_URL_BUNFIRE}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${SERVICE_USER_DBUSER}
      - DATABASE_PASSWORD=${SERVICE_PASSWORD_64_DBPASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-bunfire_db}
      - 'DATABASE_URL=postgres://${SERVICE_USER_DBUSER}:${SERVICE_PASSWORD_64_DBPASSWORD}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${DATABASE_NAME:-bunfire_db}'
    command:
      - sh
      - '-c'
      - 'bun prisma migrate deploy && exec ./server'
    restart: always
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://localhost:3000/api/health'
      interval: 20s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: 'postgres:17-alpine'
    restart: always
    volumes:
      - 'postgres:/var/lib/postgresql/data'
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-bunfire_db}
      - POSTGRES_USER=${SERVICE_USER_DBUSER}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_64_DBPASSWORD}
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -h localhost -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 20s
      timeout: 20s
      retries: 10

volumes:
  storage:
  postgres:
